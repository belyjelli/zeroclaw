# Optional overrides for local UI dev (`bun run dev`).
#
# By default the Vite dev server uses offline mocks (no gateway). The `[web_dev_mock]`
# table is optional — omit it unless you need config_preview, tokens, or enabled = false.
# Use this file to tune mock behavior, or to turn mocks off:
#
#   [web_dev_mock]
#   enabled = false
#
# Or set in web/.env.development:
#   VITE_WEB_DEV_MOCK=0
#
# Restart the dev server after changing dev-mock.toml.

[web_dev_mock]
enabled = true

# Optional: write this value to localStorage as the bearer token (e.g. for pages that read it directly).
# inject_fake_bearer_token = false
# fake_bearer_token = "dev-mock-bearer"

# Optional multi-line TOML string returned by GET /api/config in mock mode.
# config_preview = """
# [gateway]
# port = 42617
# """

# Agent chat: when true (default), stub WebSocket echoes each message.
# websocket_echo = true
